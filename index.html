<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0B09" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Thali" />
  <title>Thali</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Fonts: Bricolage Grotesque (headings) + Geist (UI) + Noto Sans Devanagari (Hindi) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..110,400..800&family=Geist:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0E0B09;
      overflow: hidden;
      color: #F6EFE6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    #root {
      width: 100%; height: 100%;
      position: relative;
    }

    /* Hide scrollbars everywhere */
    * { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; }

    /* Tap highlight off */
    * { -webkit-tap-highlight-color: transparent; }

    /* Pulse animation for the "Fresh" badge dot */
    @keyframes thali-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(0.85); }
    }

    /* Prevent text selection during taps */
    button { -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + ReactDOM (UMD production) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel standalone — compiles JSX in-browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Design tokens + shared components (THALI_T, MEAL_TOKENS, TabBar, LangToggle, …) -->
<script type="text/babel" src="src/components.jsx"></script>

<!-- Screen components (HomeScreen, MealDetailScreen, CookScreen, HistoryScreen) -->
<script type="text/babel" src="src/screens.jsx"></script>

<!-- Root app (ThaliApp — fetches data, manages state, renders screens) -->
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
